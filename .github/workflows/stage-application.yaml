name: Stage Application

on:
  push:
    branches:
      - main


jobs:

  test-on-docker-compose:
    name: Test on docker compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |-
          docker build --tag "misetius/backend:test" backend
          docker push "misetius/backend:test"

#      - name: Run tests with Docker Compose
#        run: |-

  build-publish:
    needs: test-on-docker-compose
    name: Build, Push, Release, Exercise
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

        


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # tag image with the GitHub SHA to get a unique tag
      - name: Build and publish backend image
        run: |-
          docker build --tag "misetius/backend:$GITHUB_SHA" backend
          docker push "misetius/backend:$GITHUB_SHA"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
      # update the image in the kustomization.yaml to use the new image with the GitHub SHA tag
      - name: Use right image
        run: cd overlays/staging && kustomize edit set image project/image=misetius/backend:$GITHUB_SHA 

          
      - name: commit kustomization.yaml to GitHub
        uses: EndBug/add-and-commit@v9
        with:
          add: 'kustomization.yaml'
          message: New version released ${{ github.sha }}
          cwd: 'overlays/staging'