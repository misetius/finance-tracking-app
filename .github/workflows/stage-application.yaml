name: Stage Application

on:
  push:
    branches:
      - main


jobs:

  test-on-docker-compose:
    name: Test on docker compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image for backend
        run: |-
          docker build --target development --tag "misetius/backend:development-test" backend
          docker push "misetius/backend:development-test"

      - name: Build and push Docker image for analysis
        run: |-
          docker build --target development --tag "misetius/analysis:development-test" analysis
          docker push "misetius/analysis:development-test"

      - name: Build and push Docker image for frontend
        run: |-
          docker build --target development --tag "misetius/frontend:development-test" frontend
          docker push "misetius/frontend:development-test"

      - name: Set up Docker Compose
        run: |-
          docker compose -f docker-compose.yaml up -d
          sleep 10 # wait for the services to start before running tests
      - name: Set up Python
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install pytest requests psycopg2-binary
      - name: Run tests
        run: |
          source venv/bin/activate
          pytest backend/tests/api/test_api_endpoints.py
      

  build-publish-staging-version:
    needs: test-on-docker-compose
    name: Build, Push, Release, Exercise
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # tag image with the GitHub SHA to get a unique tag
      - name: Build and publish backend image
        run: |-
          docker build --target development --tag "misetius/backend:$GITHUB_SHA" backend
          docker push "misetius/backend:$GITHUB_SHA"
      - name: Build and publish analysis image
        run: |-
          docker build --target development --tag "misetius/analysis:$GITHUB_SHA" analysis
          docker push "misetius/analysis:$GITHUB_SHA"

      - name: Build and publish frontend image
        run: |-
          docker build --target development --tag "misetius/frontend:$GITHUB_SHA" frontend
          docker push "misetius/frontend:$GITHUB_SHA"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
      # update the image in the kustomization.yaml to use the new image with the GitHub SHA tag
      - name: Use right image for backend in staging
        run: cd overlays/staging && kustomize edit set image backend/image=misetius/backend:$GITHUB_SHA 
      - name: Use right image for analysis in staging
        run: cd overlays/staging && kustomize edit set image analysis/image=misetius/analysis:$GITHUB_SHA
      - name: Use right image for frontend in staging
        run: cd overlays/staging && kustomize edit set image frontend/image=misetius/frontend:$GITHUB_SHA
          
      - name: commit kustomization.yaml to GitHub
        uses: EndBug/add-and-commit@v9
        with:
          add: 'kustomization.yaml'
          message: New version released ${{ github.sha }}
          cwd: 'overlays/staging'