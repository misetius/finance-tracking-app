apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: project
spec:
  selector:
    matchLabels:
      app: database
  serviceName: database
  replicas: 1
  template:
    metadata:
      labels:
        app: database
    spec:
     
      containers:
        - name: database
          image: postgres
          env:
            - name: DATABASE
              valueFrom:
                secretKeyRef:
                  name: database-name
                  key: database-name
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-password
                  key: database-passworduser
            - name: HOST
              valueFrom:
                secretKeyRef:
                  name: database-host
                  key: database-hostname
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: database-user
                  key: database-username
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          ports:
          - name: database
            containerPort: 5432
          volumeMounts:
          - name: data2
            mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data2
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi

---

apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: project
  labels:
    app: database
spec:
  ports:
    - name: database
      port: 5432
  clusterIP: None
  selector:
    app: database